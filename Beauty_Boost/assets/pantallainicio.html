<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beauty Store</title>

<!-- CONEXIÓN AL CSS -->
<link rel="stylesheet" href="/css/estilosiniciosecion.css">

</head>
<body>

<div class="container">

    <!-- IMAGEN MAQUILLAJE -->
    <div class="left"></div>

    <!-- FORMULARIO -->
    <div class="right">
        <div class="box">

            <!-- INICIO -->
            <div id="inicio">
                <h2>Bienvenida</h2>
                <button onclick="mostrarLogin()">Iniciar Sesión</button>
                <button onclick="mostrarRegistro()">Registrarse</button>
            </div>

            <!-- LOGIN -->
            <div id="login" style="display:none;">
                <h2>Iniciar Sesión</h2>
                <input type="email" placeholder="Correo Gmail">

                <div class="password-container">
                    <input type="password" id="loginPass" placeholder="Contraseña">
                    <span onclick="togglePassword('loginPass', this)">🙈</span>
                </div>

                <button>Entrar</button>

                <div class="link">
                    <a onclick="mostrarRecuperar()">¿Olvidaste tu contraseña?</a>
                    <a onclick="mostrarRegistro()">¿No tienes Cuenta?</a>
                </div>

                <div class="link">
                    <a onclick="volverInicio()">Volver</a>
                </div>
            </div>

            <!-- REGISTRO -->
            <div id="registro">
                <h2>Registrarse</h2>
                <input type="text" placeholder="Nombre">
                <input type="text" placeholder="Apellido">
                <label for="Tipo de Documento" <span class="required"></span>
<select id="tipoDocumento" required>
    <option value="" disabled selected>Seleccione</option>
    <option value="CE">Cédula de Extranjería</option>
    <option value="CC">Cédula de Ciudadanía</option>
    <option value="TI">Tarjeta de Identidad</option>
</select>
                <input type="text" placeholder="Numero de Documento">
                <input type="tel" placeholder="Número de teléfono">
                <input type="email" placeholder="Correo Gmail">
            
                <div class="password-container">
                    <input type="password" id="registroPass" placeholder="Contraseña">
                    <span onclick="togglePassword('registroPass', this)">🙈</span>
                </div>

                <button>Crear Cuenta</button>

                <div class="link">
                    <a onclick="volverInicio()">Volver</a>
                </div>
            </div>

            <!-- RECUPERAR -->
            <div id="recuperar" style="display:none;">
                <h2>Recuperar Contraseña</h2>
                <input type="text" placeholder="Nombre">
                <input type="text" placeholder="Apellido">
                <input type="tel" placeholder="Número de teléfono">
                <input type="email" placeholder="Correo Gmail">
                <button>Recuperar</button>

                <div class="link">
                    <a onclick="volverInicio()">Volver</a>
                </div>
            </div>

        </div>
    </div>

</div>

<script src="/js/iniciosesion.js"></script>

</body>
</html>
